name: Documentation

# Auto-deploy disabled temporarily. Restore the push block below to re-enable.
on:
  workflow_dispatch:
#  push:
#    branches:
#      - main
#    paths:
#      - 'docs/**'
#      - 'mkdocs.yml'
#      - 'src/gwaslab/**'
#      - 'pyproject.toml'
#      - '.github/workflows/deploy-docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install ".[docs]"
      - run: pip install zensical
      - run: zensical build --clean
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
